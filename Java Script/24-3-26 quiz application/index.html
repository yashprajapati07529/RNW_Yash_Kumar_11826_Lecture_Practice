<!DOCTYPE html>
<html lang="en-">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- Quiz App Start -->

    <div class="quiz-wrapper">
        <div class="quiz-container" id="quizContainer">

            <!-- Quiz - Header -->

            <div class="quiz-header">
                <div class="quiz-title" id="quizTitle">C Languagr Quiz App</div>
                <div class="timer-section">
                    <div class="timer-label" id="timerLabel"></div>
                    <div class="timer" id="timer">05:00</div>
                </div>
                <div class="progress-bar-container">
                    <div class="quiz-progress" id="progressBar"></div>
                </div>
            </div>

            <!-- Quiz - Body -->

            <div class="quiz-body" id="quizBody"></div>

            <!-- Quiz - Footer -->

            <div class="quiz-footer" id="quizFooter">
                <div class="question-counter" id="questionCounter">
                    5 outOf 10
                </div>
                <button class="btn-next" id="nextBtn" disabled>
                    Next Question
                </button>
            </div>
        </div>

        <!-- Quiz - Result -->
        <div class="results-container" id="resultsContainer">
            <h2 id="resultHeading">Quiz Complete!</h2>

            <div class="results-score" id="finalScore"></div>
            <div class="results-message" id="resultsMessage">Great effort!</div>

            <div class="results-details">
                <div class="result-row">
                    <span class="result-label">Correct Answers:</span>
                    <span class="result-value" id="correctCount"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Incorrect Answers:</span>
                    <span class="result-value" id="incorrectCount"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Total Questions:</span>
                    <span class="result-value" id="totalQuestions"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Time Taken:</span>
                    <span class="result-value" id="timeTaken"></span>
                </div>
            </div>

            <button class="btn-restart" id="restartBtn">
                Restart Quiz
            </button>
        </div>
    </div>

    <script src="./jss/script.js"></script>
</body>

</html>
