<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login system
    </title>
</head>

<body>

    <div style="font-family: sans-serif; max-width: 300px; margin: 20px auto; padding: 20px; border: 1px solid #ddd;">
        <h3>Login</h3>
        <input type="text" id="username" placeholder="Username (admin)"
            style="display:block; margin-bottom:10px; width:100%;">
        <input type="password" id="password" placeholder="Password (1234)"
            style="display:block; margin-bottom:10px; width:100%;">
        <button onclick="handleLogin()">Sign In</button>

        <ul id="login-log" style="margin-top: 20px; font-size: 14px; color: #555;"></ul>
    </div>


    <script src="./jss/script.js"></script>
</body>

</html>
